name: Deploy BOB System
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target: web, ios, all'
        required: true
        default: 'all'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Full System Build & Deploy
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_FILEPATH: ${{ secrets.APP_STORE_CONNECT_KEY_FILEPATH }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Web
          cd react-app && npm install && npm run build
          firebase deploy --only hosting --project bob20250810
          # iOS/Catalyst
          cd ../bob-ios && bundle install && bundle exec fastlane ios release_all
